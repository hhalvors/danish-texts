      - id: grundideernes-logik
        title: "Grundideernes Logik, vols. I–II"
        year: "1864–1866"
        venue: "Gyldendal (F. Hegel); Trykt hos J. H. Schultz, Copenhagen"
        note: "Published in two volumes: Vol. I (1864) and Vol. II (1866). Vol. I (456 pp. of body text) develops only the first Grundidee, Videns Idee; Vol. II (1866) continues the work and is planned for transcription and translation. Danish transcription of Vol. I from the Google Books scan (Fraktur) is COMPLETE and image-verified: the full front matter (Forord + Indledning, pp. VII–XXXIV) plus the entire body pp. 1–456 (ending 'Functionerne af den almindelige Objectivitet ere alle Functioner af subjectiv Viden.'). Compiles cleanly (requires libertinus + libertinust1math + textalpha for the \\varkappa symbols and polytonic Greek). Vol. II not yet begun."
        sections:
