      - id: philosophiens-begreb
        title: "Om Philosophiens Begreb, Natur og Væsen. En Fremstilling af Philosophiens Propædeutik"
        year: "1843"
        venue: "Copenhagen"
        note: >
          Companion piece to Om Erkjendelse og Granskning (1821/22); the Fortale
          explicitly relates the two. Danish transcription (Fraktur, from the KB
          scan) COMPLETE: front matter (Fortale) + §§ 1–21 + the verbatim
          Rettelser leaf (printed pp. 1–86), image-verified page by page with the
          NB/non-NB errata folded into the body. English translation complete
          (front matter + §§ 1–21, on the same policy as the erkjendelse companion
          volume: lightly modernized register; key terms glossed with the bracketed
          Danish on first use per section; Latin/German kept as in the print). The
          Danish Rettelser (errata) leaf corrects only the Danish original's
          orthography and is noted in a one-line translator's note.
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/philosophiens-begreb/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/philosophiens-begreb/translation.pdf"
              - label: KB Scan
                url: "https://www.kb.dk/e-mat/dod/111408004883.pdf"

      - id: psychologie-biologie
        title: "Psychologie, indledet ved almindelig Biologie"
        year: "1843"
        venue: "Copenhagen"
        note: "Condensed reworking of the psychology; 4th ed. 1862."
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: speculativ-kosmologie
        title: "Speculativ Kosmologie med Grundlag til en speculativ Theologie"
        year: "1846"
        venue: "Copenhagen"
        note: "Presents Sibbern's vitalistic conception of nature."
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: sjael-legeme
        title: "Om Forholdet imellem Sjæl og Legeme, saavel i Almindelighed som i phrenologisk, pathognomonisk, physiognomonisk og ethisk Henseende i Særdeleshed"
        year: "1849"
        venue: "Copenhagen"
        note: "One of the most detailed treatments of the psychophysical problem."
        sections:
          - title: "Complete work"
            status: to-do
