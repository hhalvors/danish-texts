  - id: favrholdt
    name: "David Favrholdt"
    dates: "1931–2012"
    bio: >
      Dr.phil. and professor of philosophy at the University of Southern Denmark.
      As a student he heard Niels Bohr lecture on quantum mechanics and atomic
      physics, an encounter that shaped his philosophical work for the rest of his
      life. The leading Danish interpreter of Bohr's philosophy of complementarity
      and of the epistemological limits set by language and concepts.
    works:

      - id: niels-bohr
        title: "Filosoffen Niels Bohr"
        year: "2009"
        venue: "Informations Forlag, Copenhagen"
        note: >
          Favrholdt's synthesis of his lifelong study of Bohr as thinker, arguing
          that Bohr was a genuine philosopher whose insight into quantum mechanics
          yielded a modern understanding of the limits of thought imposed by our
          language and concepts. A clean modern e-book (epub) edition exists, so
          this is a translation-only project — no transcription needed.
        sections:
          - title: "Complete work"
            status: skeleton
            links:
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/favrholdt/niels-bohr/translation.pdf"
              - label: Publisher
                url: "https://butik.information.dk/products/filosoffen-niels-bohr"

  - id: rosfort
    name: "René Rosfort"
    dates: "contemporary"
    bio: >
      Contemporary Danish theologian and philosopher, Professor of Ethics and
      Philosophy of Religion (from 2026) at the Søren Kierkegaard Research Centre,
      University of Copenhagen. Works on Kierkegaard, philosophical anthropology,
      and the relationship between science, religion, and human nature.
