  - id: kierkegaard
    name: "Søren Kierkegaard"
    dates: "1813–1855"
    bio: >
      The essential upstream figure for the entire Nielsen–Brøchner–Høffding debate.
      This collection includes only passages most directly relevant to that debate;
      complete texts are available through the Royal Danish Library and in the
      Princeton University Press Kierkegaard's Writings series.
    works:

      - id: postscript-immortality
        title: "Concluding Unscientific Postscript (1846), excerpt on immortality"
        year: "1846"
        venue: "Princeton University Press (Hong & Hong trans.)"
        note: "Pages 153–158. Translated by David F. Swenson and Walter Lowrie."
        sections:
          - title: "pp. 153–158"
            status: complete
            links:
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/kierkegaard/postscript-immortality/translation.pdf"

  - id: nielsen
