# Danish Philosophical Texts — Catalog
#
# This file is the source of truth for the danish-texts page on hanshalvorson.com.
# It is intended to live in ~/danish-texts/catalog.yaml and be symlinked here:
#   ln -s ~/danish-texts/catalog.yaml ~/hhalvors.github.io/data/danish-texts.yaml
#
# Status values: complete | in-progress | skeleton | to-do | coming-soon | placeholder
#
# Link labels (suggested conventions):
#   Transcription, Translation, Scan, KB Scan, Wikisource,
#   Runeberg, JSTOR, Journal, PDF

authors:

  - id: holberg
    name: "Ludvig Holberg"
    dates: "1684–1754"
    bio: >
      Bergen-born, Copenhagen-based playwright, historian, essayist and
      professor — the founder of modern Danish-Norwegian literature and, for
      Høffding, the founder of independent philosophical reflection in Denmark:
      »Danske Filosofer« (1909) opens with him. Holberg is no system-builder but
      a skeptic and empiricist in the Montaigne–Bayle vein, hostile to dogma and
      speculative systems, insisting that "man må først lære at tvivle førend man
      må lære at tro" (one must first learn to doubt before one can learn to
      believe). His relevance to the line running toward Bohr's "epistemological
      lesson" is one of disposition rather than doctrine: epistemic humility, the
      testing of received norms against sound reason, and — especially in »Niels
      Klim« — a sustained play with the relativity of standpoint, the recognition
      that how things appear depends on the observer's position. This
      anti-dogmatic, perspective-conscious temper is the seedbed of the critical
      Danish tradition that Høffding inherits and transmits. Further works not
      listed below include »Introduction til Naturens og Folke-Rettens Kundskab«
      (1716), the »Moralske Fabler« (1751), and the Latin autobiographical
      epistles (1728–1743).
    works:

      - id: moralske-tanker
        title: "Moralske Tanker"
        year: "1744"
        venue: "Kjøbenhavn"
        note: >
          Holberg's central philosophical work: a collection of reflective
          essays, framed as commentaries on his own epigrams, on morality,
          religion, knowledge and doubt. The clearest statement of his
          anti-systematic skepticism and the "doubt before belief" method that
          Høffding takes as the starting point of Danish philosophy.
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: epistler
        title: "Epistler"
        year: "1748–1754"
        venue: "Kjøbenhavn, 5 vols."
        note: >
          Over 500 essayistic letters, the mature continuation of the »Moralske
          Tanker«: doubt, tolerance, the relativity of custom, and the limits of
          human knowledge, handled case by case rather than as a system.
        sections:
          - title: "Complete work (vols. I–V)"
            status: to-do
            links: []

      - id: niels-klim
        title: "Niels Klims underjordiske Rejse (Nicolai Klimii iter subterraneum)"
        year: "1741"
        venue: "Latin original, Copenhagen/Leipzig; Danish transl. J. Baggesen 1789"
        note: >
          Satirical-philosophical subterranean voyage in Latin. Its device — a
          traveler judging human institutions from wholly other standpoints, and
          being judged in turn — is a sustained exercise in the relativity of
          viewpoint and religious/intellectual tolerance: the "epistemological
          lesson" theme (how things appear depends on the observer's position) in
          a literary key.
        sections:
          - title: "Complete work"
            status: to-do
            links: []

  - id: treschow
    name: "Niels Treschow"
    dates: "1751–1833"
    bio: >
      Norwegian-born philosopher; professor of philosophy at Copenhagen
      1803–1813, then the first professor of philosophy at the new Frederik
      University in Christiania (Oslo) from 1813. A Spinoza- and
      Leibniz-influenced monist and self-described Neoplatonist whose late
      "Identitets-system" treats the mental and the bodily — and, more broadly,
      the ideal and the real, subject and object — as two sides of one reality.
      His insistence that "in the real world only individuals exist" (universals
      being mere "Hjælpemidler til Oversyn," aids to survey, not knowledge of
      things in themselves) makes him an early source of the emphasis on
      concrete individuality that runs through nineteenth-century Danish
      philosophy. The relevance to the Bohr line is direct: Harald Høffding —
      Bohr's philosophical mentor, and himself in this catalog — discussed
      Treschow at length in »Danske Filosofer« (1909) and reprinted his essay on
      individuality in »Udvalgte Stykker af dansk filosofisk Litteratur« (1910).
      Treschow is thus the earliest figure on the Danish subject–object /
      individuality tradition that reaches Bohr's "epistemological lesson."
      Further works not listed below include the two early critiques of Kant
      (1794, 1798), »Moral for Folk og Stat« (1810–11), »Lovgivnings-Principier«
      (1820–23), and »Christendommens Aand« (1828).
    works:

      - id: om-gud-idee-sandseverdenen
        title: "Om Gud, Idee- og Sandseverdenen samt de førstes Aabenbarelse i den sidste. Et philosophisk Testament"
        year: "1831–1833"
        venue: "Christiania (Grøndahl), 3 vols."
        note: >
          Treschow's summa, written in retirement and prefaced with an
          autobiography; the detailed statement of his monist "Identitets-system."
          God is not the sum of things but "a real individual" that makes all
          things one; consciousness "pictures the Absolute One," standing to the
          manifold as the mind stands to its own thoughts and decisions. The
          most explicit source for the subject–object identity theme. NB: the
          third word is »Sandse-« (world of sense), not »Sandheds-«.
        sections:
          - title: "Complete work (vols. I–III)"
            status: to-do
            links: []

      - id: menneskelige-natur
        title: "Om den menneskelige Natur i Almindelighed, især dens aandelige Sider"
        year: "1812"
        venue: "Kjøbenhavn"
        note: >
          The first psychology written in Danish. Anti-Cartesian: man is not a
          composite of soul and body; rather the mental and the bodily are the
          same thing considered as an object of the inner and the outer sense.
          The clearest early anticipation of the "conditions of observation"
          theme — the same reality under two irreducible modes of access.
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: enslige-ting
        title: "Gives der noget Begreb eller nogen Idee om enslige Ting? Besvaret med Hensyn til Menneskeværd og Menneskevel"
        year: "1810"
        venue: "Det Kgl. Danske Videnskabernes Selskabs Skrifter, bd. 5"
        note: >
          Short, self-contained treatise arguing that only individuals are real
          and that universals are mere aids to survey, not exact knowledge of
          things in themselves. The core statement of Treschow's primacy of the
          individual — the theme most resonant with Bohr's language of the
          "individuality" (indivisibility) of the quantum phenomenon. Reprinted
          in excerpt by Høffding, »Udvalgte Stykker af dansk filosofisk
          Litteratur« (1910), and complete in A.H. Winsnes' ed. of »Philosophiske
          Forsøg og andre Skrifter« (1966).
        sections:
          - title: "Complete treatise"
            status: to-do
            links: []

      - id: almindelig-logik
        title: "Almindelig Logik"
        year: "1813"
        venue: "Kjøbenhavn"
        note: >
          His textbook of logic / theory of knowledge, the counterpart to the
          1812 psychology; develops the epistemology of the individual (concepts
          of particulars vs. general concepts).
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: philosophiske-forsog
        title: "Philosophiske Forsøg"
        year: "1805"
        venue: "Kjøbenhavn"
        note: >
          The first sketch of the identity-system later expanded in the 1831–33
          »Testament«. Useful as the compact early statement of his monism.
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: historiens-philosophie
        title: "Elementer til Historiens Philosophie"
        year: "1811"
        venue: "Kjøbenhavn, 2 vols."
        note: >
          Treschow's developmental philosophy applied to living nature and to
          the history of the species (and of individual nations), which pass
          through childhood, youth, maturity and age. The continuity/development
          strand of the tradition — a counterpoint to the quantum discontinuity
          that Bohr's epistemology had to accommodate.
        sections:
          - title: "Complete work (vols. I–II)"
            status: to-do
            links: []

  - id: orsted
    name: "Hans Christian Ørsted"
    dates: "1777–1851"
    bio: >
      Physicist, chemist and natural philosopher; professor at Copenhagen from
      1806 and founder of the Polytekniske Læreanstalt (1829). In 1820 he
      discovered electromagnetism — that an electric current deflects a magnetic
      needle — and in 1825 was the first to isolate metallic aluminium. But
      Ørsted was as much a philosopher of nature as an experimenter: a student of
      Kant and of the German Naturphilosophie, he held that the same reason the
      mind finds in itself is objectively at work in nature, so that the laws of
      thought and the laws of nature ultimately coincide. This dynamical monism —
      opposed forces as convertible expressions of one underlying activity — is
      the thesis of his late essay-collection »Aanden i Naturen« (1850), "the
      spirit (reason) in nature," and it is why he belongs in this catalog: it is
      a Danish source of the unity-of-nature theme running toward Bohr. Ørsted
      also gave physics the term »Tankeeksperiment« (thought experiment) and
      coined much of the modern Danish scientific vocabulary; Høffding treated him
      among the »Danske Filosofer«. Two English editions cover most of his
      important work: »The Soul in Nature« (trans. L. & J. B. Horner, London:
      Bohn, 1852) for the philosophy of nature, and the 83-item »Selected
      Scientific Works of Hans Christian Ørsted« (trans. Jelved, Jackson &
      Knudsen, Princeton, 1998) for the scientific and aesthetic essays — the
      source of most of the translation links below. Further works not listed
      below include »Videnskaben om Naturens almindelige Love« (1809),
      »Naturlærens mechaniske Deel« (1844), and the poem »Luftskibet« (1836).
    works:

      - id: metaphysik-naturens
        title: "Dissertatio de forma metaphysices elementaris naturae externae"
        year: "1799"
        venue: "Kjøbenhavn (doctoral dissertation, based on Kant)"
        note: >
          Ørsted's Kantian doctoral dissertation, the metaphysical foundation of
          everything that followed: nature construed through fundamental dynamical
          forces rather than inert matter. Rendered into English in the Selected
          Scientific Works as two 1799 pieces — "Fundamentals of the Metaphysics
          of Nature, Partly According to a New Plan" and "Dissertation on the
          Structure of the Elementary Metaphysics of External Nature."
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: "Translation (Selected Scientific Works, 1998)"
                url: "https://press.princeton.edu/books/hardcover/9780691635187/selected-scientific-works-of-hans-christian-orsted"

      - id: forste-indledning-naturlaere
        title: "Første Indledning til den almindelige Naturlære"
        year: "1811"
        venue: "Kjøbenhavn"
        note: >
          Introductory lectures on the method and unity of physics — his fullest
          early statement of how the study of nature should be conceived and
          taught. English in the Selected Scientific Works as "First Introduction
          to General Physics."
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: "Translation (Selected Scientific Works, 1998)"
                url: "https://press.princeton.edu/books/hardcover/9780691635187/selected-scientific-works-of-hans-christian-orsted"

      - id: ansicht-chemische-naturgesetze
        title: "Ansicht der chemischen Naturgesetze, durch die neueren Entdeckungen gewonnen"
        year: "1812"
        venue: "Berlin (Realschulbuchhandlung); German"
        note: >
          Ørsted's systematic statement of a dynamical chemistry — chemical
          phenomena as the play of two fundamental opposed forces — the mature
          theoretical background to the 1820 discovery. English in the Selected
          Scientific Works as "View of the Chemical Laws of Nature."
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: "Translation (Selected Scientific Works, 1998)"
                url: "https://press.princeton.edu/books/hardcover/9780691635187/selected-scientific-works-of-hans-christian-orsted"

      - id: conflictus-electricus
        title: "Experimenta circa effectum conflictus electrici in acum magneticam"
        year: "1820"
        venue: "Hafniae [Copenhagen]; Latin pamphlet, 21 July 1820"
        note: >
          The four-page Latin announcement of the discovery of electromagnetism —
          a current-carrying wire deflects a nearby magnetic needle — the single
          most consequential thing Ørsted did and a founding document of modern
          physics. Translated into English at once as "Experiments on the Effect
          of a Current of Electricity on the Magnetic Needle" (Annals of
          Philosophy 16, 1820); also in the Selected Scientific Works.
        sections:
          - title: "Complete paper"
            status: complete
            links:
              - label: "Translation (Annals of Philosophy, 1820)"
                url: "https://erenow.org/common/history-philosophy-science-reader/54.php"
              - label: "Translation (Selected Scientific Works, 1998)"
                url: "https://press.princeton.edu/books/hardcover/9780691635187/selected-scientific-works-of-hans-christian-orsted"

      - id: fysikken-og-det-skonne
        title: "Essays on light and the physics of beauty (»det Skjønnes Physik«)"
        year: "1842–1843"
        venue: "Copenhagen"
        note: >
          Ørsted's aesthetics: the attempt to ground beauty — especially the
          beauty of light and lustre — in physical law, the counterpart in art to
          his philosophy of nature and a key source for his epistemology of
          »Anskuelse« (intuition/contemplation). English in the Selected
          Scientific Works as "An Investigation of Light with Regard to the
          Physics of Beauty," its continuation, and "Development of the Theory of
          Lustre."
        sections:
          - title: "Complete essays"
            status: complete
            links:
              - label: "Translation (Selected Scientific Works, 1998)"
                url: "https://press.princeton.edu/books/hardcover/9780691635187/selected-scientific-works-of-hans-christian-orsted"

      - id: aanden-i-naturen
        title: "Aanden i Naturen"
        year: "1850"
        venue: "Kjøbenhavn (A. F. Høst), 2 vols. 1849–50"
        note: >
          Ørsted's philosophical masterwork: essays and dialogues on the
          philosophy of nature, science, reason and beauty, arguing that nature is
          the expression of an all-pervading reason. The fullest statement of his
          dynamical Naturphilosophie and his most directly philosophical book.
          Translated complete into English (from Ørsted's own German »Der Geist in
          der Natur«, 1850–51) as »The Soul in Nature, with Supplementary
          Contributions«.
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: "Translation (Horner 1852)"
                url: "https://archive.org/details/soulinnaturewit00horngoog"
              - label: Wikisource
                url: "https://en.wikisource.org/wiki/The_Soul_in_Nature"
              - label: HathiTrust
                url: "https://catalog.hathitrust.org/Record/001389004"

  - id: sibbern
    name: "F.C. Sibbern"
    dates: "1785–1872"
    bio: >
      Frederik Christian Sibbern, professor of philosophy at Copenhagen
      1813–1870. Close friend of Poul Martin Møller; Kierkegaard attended
      his lectures. A transitional figure who resisted the Hegelian campaign
      of the 1830s and anticipated several of Kierkegaard's central arguments.
    works:

      - id: menneskets-natur
        title: "Menneskets aandelige Natur og Væsen. Et Udkast til en Psychologie"
        year: "1819–1828"
        venue: "Copenhagen"
        note: >
          Sibbern's principal psychological work, published in two parts:
          Part 1 (1819) and Part 2 (1828), the latter subtitled »Psychologisk
          Pathologie«. Part 2 was reissued 1885 by his son Gabriel Sibbern as
          »Læren om de menneskelige Følelser og Lidenskaber«.
        sections:
          - title: "Complete work (both parts)"
            status: to-do
            links: []

      - id: om-elskov
        title: "Om Elskov eller Kjerlighed imellem Mand og Qvinde"
        year: "1819"
        venue: "Copenhagen"
        note: >
          Transcribed from the »Tredie uforandrede Udgave« (Kjøbenhavn 1858;
          text unchanged from the 1819 first edition). Three »Bøger« plus a
          table of contents; front-matter prefaces in Fraktur, body in roman.
          Transcription and English translation both complete and
          image-verified (front matter through Tredie Bog).
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/om-elskov/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/om-elskov/translation.pdf"
              - label: HathiTrust
                url: "https://catalog.hathitrust.org/Record/011261596"

      - id: logikens-elementer
        title: "Logikens Elementer"
        year: "1822"
        venue: "Copenhagen"
        note: "Printed as manuscript for students; new edition 1827."
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: erkjendelse
        title: "Om Erkjendelse og Granskning. Til Indledning i det academiske Studium"
        year: "1822"
        venue: "Copenhagen"
        note: >
          Transcribed from the first edition (Kjøbenhavn 1822, Paa Fr.
          Brummers Forlag; Trykt hos C. Græbe). Danish transcription complete
          and image-verified (Fortale, Oversigt, body §§ 1–22, Slutning, and
          the Rettelser errata leaf). English translation complete (lightly
          modernized register; front matter + §§ 1–22 + Conclusion; key terms
          glossed with the bracketed Danish on first use per section). The
          Danish Rettelser (errata) leaf corrects only the Danish original's
          orthography and is noted in a one-line translator's note.
        sections:
          - title: "Complete work"
            status: complete
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/erkjendelse/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/erkjendelse/translation.pdf"

      - id: gabrielis
        title: "Udaf Gabrielis' Breve til og fra Hjemmet"
        year: "1826"
        venue: "Copenhagen"
        note: >
          Sibbern's Gabrielis epistolary novel — a Danish »wertheriade«. First
          published 1826 as »Efterladte Breve af Gabrielis«; expanded into the
          collected »Udaf Gabrielis' Breve til og fra Hjemmet«. Transcribed from
          the »Femte Udgave« (Kjøbenhavn 1893, Det Reitzelske Forlag), which
          carries a Forord by Harald Høffding and Sibbern's own dedication to
          Bishop J. P. Mynster (dated 1850). Roman/antiqua; ~302 pp. of dated
          letters. Title page and dedication complete and image-verified; body
          of letters in progress.
        sections:
          - title: "Complete work"
            status: in-progress
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/sibbern/gabrielis/transcription.pdf"

      - id: logik-taenkelaere
        title: "Logik som Tænkelære fra en intelligent Iagttagelses Standpunct og i analytisk-genetisk Fremstilling"
        year: "1835"
        venue: "Copenhagen"
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: bemaerkninger
        title: "Bemærkninger og Undersøgelser, fornemmelig betreffende Hegels Philosophie"
        year: "1838"
        venue: "C.A. Reitzel, Copenhagen"
        note: "Originally in Maanedsskrift for Litteratur XIX (1838)."
        sections:
