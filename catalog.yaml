  - id: brochner
    name: "Hans Brøchner"
    dates: "1820–1875"
    bio: >
      Professor of philosophy at Copenhagen 1857–1875. Post-Hegelian, moved toward
      a naturalistic humanism under the influence of Feuerbach and Strauss. His
      critical engagement with Kierkegaard and Nielsen makes him a crucial third
      voice; Høffding credited Brøchner's lectures as the direct cause of his own
      conversion away from Nielsen's position.
    works:

      - id: kierkegaard-virksomhed
        title: "Om Søren Kierkegaards Virksomhed som religieus Forfatter"
        year: "1855"
        venue: "Fædrelandet, 1 December 1855"
        note: >
          Published anonymously under the mark "-r". Brøchner's first
          comprehensive account of Kierkegaard's authorship, written just
          after Kierkegaard's death. Article text reprinted in C.H. Koch
          (ed.), Brøchner og Kierkegaard (Scientia Danica, Series H,
          Humanistica 8, vol. 13).
        sections:
          - title: "Complete article"
            status: complete
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/brochner/kierkegaard-virksomhed/transcription.pdf"
