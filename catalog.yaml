    dates: "1809–1884"
    bio: >
      Professor of philosophy at Copenhagen 1841–1884. Developed the central position
      of the mid-century debate: that faith and knowledge spring from absolutely
      heterogeneous principles. Target of both Brøchner's philosophical critique and
      Brandes's cultural polemic.
