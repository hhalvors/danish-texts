  - id: kierkegaard
    name: "Søren Kierkegaard"
    dates: "1813–1855"
    bio: >
      The essential upstream figure for the entire Nielsen–Brøchner–Høffding debate.
      This collection includes only passages most directly relevant to that debate;
      complete texts are available through the Royal Danish Library and in the
      Princeton University Press Kierkegaard's Writings series.
    works:

      - id: postscript-immortality
        title: "Concluding Unscientific Postscript (1846), excerpt on immortality"
        year: "1846"
        venue: "Princeton University Press (Hong & Hong trans.)"
        note: "Pages 153–158. Translated by David F. Swenson and Walter Lowrie."
        sections:
          - title: "pp. 153–158"
            status: complete
            links:
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/kierkegaard/postscript-immortality/translation.pdf"

      - id: ved-en-grav
        title: "Ved en Grav (Tre Taler ved tænkte Leiligheder, 1845), tredje tale"
        year: "1845"
        venue: "C.A. Reitzel, Copenhagen"
        note: >
          The third of the Three Discourses on Imagined Occasions ("At a
          Graveside"). Danish transcription from the Søren Kierkegaards Skrifter
          reading text (SKS 5, pp. 442–469); original 1845 orthography retained,
          editorial page numbers omitted. Transcription verified character-exact
          against the KB text portal.
        sections:
          - title: "Complete discourse (SKS 5, pp. 442–469)"
            status: complete
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/kierkegaard/ved-en-grav/transcription.pdf"
              - label: KB Text
                url: "https://tekster.kb.dk/text/sks-ttl-txt-root"

  - id: nielsen
    name: "Rasmus Nielsen"
    dates: "1809–1884"
    bio: >
      Professor of philosophy at Copenhagen 1841–1884. Developed the central position
      of the mid-century debate: that faith and knowledge spring from absolutely
      heterogeneous principles. Target of both Brøchner's philosophical critique and
      Brandes's cultural polemic.
    works:

      - id: johannesclimacos
        title: "Mag. S. Kierkegaards \"Johannes Climacus\" og Dr. H. Martensens \"Christelige Dogmatik\""
        year: "1849"
        venue: "C.A. Reitzel, Copenhagen"
        sections:
          - title: "Complete work"
            status: to-do
            links: []

      - id: theologiens-naturbegreb
        title: "Om Theologiens Naturbegreb, med særligt Hensyn til Malebranche"
        year: "1855"
        venue: "Det Schultziske Officin (Universitetsprogram)"
        note: "Reformation-festival Indbydelsesskrift, 1855. Danish transcription complete (printed pp. 3–47: the Malebranche essay plus the appended doctoral vitae and festival invitation). English translation covers the treatise (pp. 3–37); the appendix (doctoral vitae + festival invitation, pp. 38–47) is left untranslated by choice."
        sections:
          - title: "Treatise (pp. 3–37)"
            status: complete
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/nielsen/theologiens-naturbegreb/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/nielsen/theologiens-naturbegreb/translation.pdf"

      - id: philosophie-og-mathematik
        title: "Philosophie og Mathematik"
        year: "1857"
        venue: "Gyldendal, Copenhagen"
        note: "Subtitle: 'en propædeutisk Afhandling' (R. Nielsen). ~84 pp. of Fraktur body text, math- and figure-heavy. Complete in full: image-verified Danish transcription (69 pp.) and English translation of the whole book (70 pp.), 19 TikZ figures carried over verbatim."
        sections:
          - title: "Complete work (whole book)"
