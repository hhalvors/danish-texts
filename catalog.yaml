  - id: hoeffding
    name: "Harald Høffding"
    dates: "1843–1931"
    bio: >
      Nielsen's student and eventual successor as the dominant figure in Danish
      philosophy. His intellectual development is the key to the whole debate: in 1866
      he explicitly defended Nielsen's position, then within a year — under Brøchner's
      influence — changed his mind completely, spending the next three decades working
      out what that conversion implied.
    works:

      - id: nielsen-kursus-notes
        title: "Studentnoter fra Rasmus Nielsens kursus om Grundideernes Logik"
