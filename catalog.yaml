                url: "https://hhalvors.github.io/danish-texts/texts/moller/affectation/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/moller/affectation/translation.pdf"

      - id: ironie
        title: "Om Begrebet Ironie"
        year: "1835–1837"
        venue: "Efterladte Skrifter, bd. 3, ed. F.C. Olsen, C.A. Reitzel"
        note: >
          Fragment (Brudstykke II) occasioned by Provost Tryde's review of
          Sibbern's Æsthetik (Maanedsskrift for Litteratur, bd. 13, 1835). As a
          member of the journal's editorial board Møller began appended remarks
          on the concept of irony but, per the editor's note, "bragte kun
          Indledningen til Ende": only the treatment of MORAL irony was
          completed, and the piece breaks off as it turns to poetic irony
          ("Vi gaae nu over til den poetiske Ironie"). Traces irony from Greek
          moral consciousness (Aristotle) through Kant and Fichte to F.
          Schlegel's Lucinde and Hegel's "subjectivity that knows itself as the
          highest" — a direct line to Kierkegaard's Concept of Irony.
          Transcribed from the Fraktur setting of Efterladte Skrifter vol. 3
          (3rd ed.), printed pp. 152–158.
        sections:
          - title: "Complete fragment (pp. 152–158)"
            status: in-progress
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/moller/ironie/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/moller/ironie/translation.pdf"

      - id: moralphilosophi
        title: "Forelæsnings-Paragrapher over Moralphilosophien"
        year: "1837"
        venue: "Efterladte Skrifter, bd. 5, C.A. Reitzel, 1855–56, pp. 141–162"
        note: >
          Møller's ethics in 47 numbered lecture-paragraphs (§§), reconstructed
          by the editor "from lecture-notes of 1837, collated with the Author's
          manuscript" (F.C. Olsen). The systematic practical-philosophy
          counterpart to the Ontologien. Three main parts: the Doctrine of
          Imputation (§§ 6–12; freedom against both indifferentism and
          determinism, the anatomy of the voluntary/intentional/deliberate act);
          the Doctrine of Happiness (§§ 13–22; interest, feeling, the Cyrenaic/
          Cynic/Epicurean sequence, self-preservation, benevolence, right, the
          perfect existence); and the Doctrine of the Good (§§ 23–47), covering
          Virtue (the mean between extremes, affectation), Duty (the categorical
          imperative), and Conscience — closing (§ 47) with the individual
          fulfilling its vocation as a member of the rationally organised State.
          Transcribed from the Fraktur setting of Efterladte Skrifter vol. 5.
        sections:
          - title: "Complete work (§§ 1–47, pp. 141–162)"
            status: in-progress
            links:
              - label: Transcription
                url: "https://hhalvors.github.io/danish-texts/texts/moller/moralphilosophi/transcription.pdf"
              - label: Translation
                url: "https://hhalvors.github.io/danish-texts/texts/moller/moralphilosophi/translation.pdf"

