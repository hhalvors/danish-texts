      - id: affectation
        title: "Forberedelser til en Afhandling om Affectation"
        year: "1837"
        venue: "Efterladte Skrifter, bd. 3, ed. F.C. Olsen, C.A. Reitzel"
        note: >
          Fragment (Brudstykke IV): materials toward a projected treatise on
          affectation — one of Møller's signature ethical-psychological concepts
          (inauthenticity, self-deception). Opens with a connected treatment
          (begun 1837) defining affectation as a compound of falsity and
          self-deception and distinguishing three degrees (momentary, fixed,
          changing); then the editor's thematic grouping of the author's
          scattered aphoristic notes, rich in cultural diagnosis. Contains the
          striking "two sides" passage — "Da enhver Sag kan sees fra to Sider,
          var det tilfældigt, fra hvilken Side den øieblikkeligen blev seet" —
          and the China frog-bundle image. Pairs directly with § 29 of the
          Moralphilosophi lectures. Transcribed from the Fraktur setting of
          Efterladte Skrifter vol. 3 (3rd ed.), printed pp. 163–188.
        sections:
          - title: "Complete fragment (pp. 163–188)"
            status: in-progress
            links:
